server:
  port: 8080

spring:
  application:
    name: transfer-platform
  datasource:
    url: jdbc:h2:mem:plafonds;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  plafond-mensuel: 1000000   # Plafond mensuel Hors CEMAC en FCFA
  sms:
    provider: console        # 'console' (dev: code affiché dans les logs) | 'twilio' (prod)
  jwt:
    secret: "changer-cette-cle-secrete-de-64-caracteres-minimum-en-production!!"
    expiration-ms: 86400000  # 24h

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/transfer_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: erika
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
