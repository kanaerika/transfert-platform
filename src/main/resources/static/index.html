<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transfer Platform</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    button { padding: 0.6rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Transfer Platform</h1>
  <button onclick="checkBackend()">Test connection</button>
  <pre id="result">Waiting...</pre>

  <script>
    async function checkBackend() {
      try {
        const response = await fetch('http://localhost:8080/api/health');
        const data = await response.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById('result').textContent = 'Connection failed: ' + error.message;
      }
    }
  </script>
</body>
</html>
